name: CI

on:
  repository_dispatch:
    types: [ci-trigger]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to checkout"
        required: true
        default: "refs/heads/main"
      sha:
        description: "Commit SHA for status reporting"
        required: true

env:
  PRIVATE_REPO: wibus-wee/block

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: block_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ref=${{ github.event.client_payload.ref }}" >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.client_payload.sha }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ inputs.ref }}" >> $GITHUB_OUTPUT
            echo "sha=${{ inputs.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Report pending status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PRIVATE_REPO_PAT }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: 'wibus-wee',
              repo: 'block',
              sha: '${{ steps.vars.outputs.sha }}',
              state: 'pending',
              target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              context: 'CI',
              description: 'Running CI checks...'
            });

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ steps.vars.outputs.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck backend
        run: pnpm --dir packages/backend run typecheck

      - name: Typecheck frontend
        run: pnpm --dir packages/frontend exec tsc --noEmit -p tsconfig.json

      - name: Typecheck daemon
        run: pnpm --dir packages/daemon run typecheck

      - name: Build frontend
        run: pnpm --dir packages/frontend run build

      - name: Build daemon
        run: pnpm --dir packages/daemon run build

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/block_test
        run: cd packages/backend && bunx vitest --run

      - name: Report success
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PRIVATE_REPO_PAT }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: 'wibus-wee',
              repo: 'block',
              sha: '${{ steps.vars.outputs.sha }}',
              state: 'success',
              target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              context: 'CI',
              description: 'All checks passed'
            });

      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PRIVATE_REPO_PAT }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: 'wibus-wee',
              repo: 'block',
              sha: '${{ steps.vars.outputs.sha }}',
              state: 'failure',
              target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              context: 'CI',
              description: 'CI checks failed'
            });
