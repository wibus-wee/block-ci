name: Deploy Frontend

on:
  repository_dispatch:
    types: [deploy-frontend]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to checkout"
        required: true
        default: "refs/heads/main"

env:
  PRIVATE_REPO: wibus-wee/block

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ref=${{ github.event.client_payload.ref }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ inputs.ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ steps.vars.outputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir packages/frontend run build

      # --- Choose ONE of the deployment targets below ---

      # Option A: Cloudflare Pages
      # - name: Deploy to Cloudflare Pages
      #   uses: cloudflare/wrangler-action@v3
      #   with:
      #     apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      #     accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      #     command: pages deploy packages/frontend/dist --project-name=block

      # Option B: Upload as artifact (for manual download or other deployment)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist
          retention-days: 7
